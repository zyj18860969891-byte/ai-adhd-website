# Railway Multi-Service Monorepo Configuration for ADHD Task Manager PWA

[build]
builder = "nixpacks"
# Build timeout in milliseconds (20 minutes)
timeout = 1200000

# Environment variables for build
[build.env]
# Enable npm cache
NPM_CONFIG_CACHE = "/tmp/.npm"
# Enable verbose logging
NPM_CONFIG_LOGLEVEL = "info"
# Use mirror registry for faster builds
NPM_CONFIG_REGISTRY = "https://registry.npmmirror.com"
# Enable offline mode for better caching
NPM_CONFIG_PREFER_OFFLINE = "true"
# Set NODE_ENV for production
NODE_ENV = "production"

# Build configuration
dockerfile = "Dockerfile.simple"
# Build arguments
args = [
  "NODE_ENV=production"
]

[deploy]
# Health check configuration
healthcheck_path = "/api/health"
healthcheck_interval = 30
healthcheck_timeout = 10
healthcheck_retries = 3
healthcheck_start_period = 30

# Auto deploy on git push
auto_deploy = true

# Environment variables for deployment
[deploy.env]
NODE_ENV = "production"
PORT = "3000"
# Railway specific settings
RAILWAY_ENVIRONMENT = "production"

# Service configuration
[deploy.service]
# Enable auto-scaling
min_instances = 1
max_instances = 3

# Resource allocation
cpu = "500m"
memory = "512Mi"

# 主服务器 (Gateway/API Gateway)
[[services]]
name = "gateway"
root = "."
command = "npm start"
port = 3000
max_procs = 1

# AI 服务
[[services]]
name = "ai-service"
root = "services/ai-service"
command = "node index.js"
port = 3001
max_procs = 1

# 数据库服务
[[services]]
name = "db-service"
root = "services/db-service"
command = "node index.js"
port = 3002
max_procs = 1

# 通知服务
[[services]]
name = "notification-service"
root = "services/notification-service"
command = "node index.js"
port = 3003
max_procs = 1
RAILWAY_SERVICE_NAME = "ai-adhd-website"

# Monitoring and logging
[monitoring]
# Enable health checks
health_check_enabled = true

# Health check interval in seconds
health_check_interval = 30

# Health check timeout in seconds
health_check_timeout = 5

# Number of failed health checks before restart
health_check_retries = 3

# Logging settings
[logging]
# Log level
level = "info"

# Enable structured logging
structured = true

# Enable request logging
request_logging = true

# Enable error logging
error_logging = true