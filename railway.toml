# Railway Multi-Service Monorepo Configuration for ADHD Task Manager PWA

[build]
builder = "nixpacks"

[env]
NODE_ENV = "production"
OPENROUTER_API_KEY = "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"
OPENROUTER_MODEL = "qwen/qwen3-235b-a22b-2507"
JWT_SECRET = "your_strong_jwt_secret_here_change_this"
DB_PATH = "./data/tasks.db"

# 主服务器 (Gateway/API Gateway)
[[services]]
name = "gateway"
root = "."
command = "npm start"
port = 3000
max_procs = 1

# AI 服务
[[services]]
name = "ai-service"
root = "services/ai-service"
command = "node index.js"
port = 3001
max_procs = 1

# 数据库服务
[[services]]
name = "db-service"
root = "services/db-service"
command = "node index.js"
port = 3002
max_procs = 1

# 通知服务
[[services]]
name = "notification-service"
root = "services/notification-service"
command = "node index.js"
port = 3003
max_procs = 1